<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../styles/styles_login.css">
    <script defer src="../scripts/Main.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="caixa-login">
            
            <div class="logo">
                <img src="" alt="logo">
            </div>

            <form>
                <input type="text" placeholder="Usuário" class="input-custom">
                <input type="password" placeholder="Senha" class="input-custom">
                <button type="submit" class="btn-login" id="btn-entrar">Entrar</button>
            </form>

            <p class="link">
                <strong>Não tem conta? <a href="registro.html"> Cadastre-se</a></strong>
            </p>
        </div>
    </div>
    
</body>
</html>
